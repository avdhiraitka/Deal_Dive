<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DealDive – Price Trends</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .trends-search {
            max-width: 600px;
            margin: 20px auto;
            display: flex;
            gap: 10px;
        }

        .trends-search input {
            flex: 1;
            padding: 14px 20px;
            border: 1px solid #1e293b;
            border-radius: 12px;
            background: #0b1224;
            color: white;
            font-size: 15px;
        }

        .trends-search button {
            padding: 14px 28px;
            border: none;
            border-radius: 12px;
            background: #4fd1c5;
            color: #0f172a;
            font-weight: 700;
            cursor: pointer;
            font-size: 15px;
        }

        .product-list {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin: 20px auto;
            max-width: 900px;
        }

        .product-chip {
            padding: 10px 18px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 25px;
            color: #e2e8f0;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        .product-chip:hover,
        .product-chip.active {
            background: #4fd1c5;
            color: #0f172a;
            border-color: #4fd1c5;
            font-weight: 700;
        }

        .price-stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px auto;
            max-width: 700px;
            flex-wrap: wrap;
        }

        .stat-card {
            background: #111827;
            border: 1px solid #1e293b;
            border-radius: 14px;
            padding: 18px 25px;
            text-align: center;
            min-width: 130px;
        }

        .stat-card h4 {
            color: #94a3b8;
            font-size: 11px;
            margin: 0 0 8px 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-card .value {
            font-size: 20px;
            font-weight: 700;
        }

        .stat-card .value.green {
            color: #10b981;
        }

        .stat-card .value.red {
            color: #ef4444;
        }

        .stat-card .value.teal {
            color: #4fd1c5;
        }

        /* ===== BUILT-IN BAR CHART (no CDN needed) ===== */
        .bar-chart-wrapper {
            max-width: 800px;
            margin: 30px auto;
            background: #111827;
            border: 1px solid #1e293b;
            border-radius: 18px;
            padding: 30px;
        }

        .bar-chart-title {
            text-align: center;
            color: #e2e8f0;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 25px;
        }

        .bar-chart {
            display: flex;
            align-items: flex-end;
            justify-content: space-around;
            height: 250px;
            border-bottom: 2px solid #334155;
            padding: 0 10px;
            gap: 8px;
        }

        .bar-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            max-width: 90px;
        }

        .bar-price-label {
            color: #4fd1c5;
            font-size: 11px;
            font-weight: 700;
            margin-bottom: 6px;
            white-space: nowrap;
        }

        .bar {
            width: 100%;
            max-width: 50px;
            background: linear-gradient(180deg, #4fd1c5, #0d9488);
            border-radius: 6px 6px 0 0;
            transition: height 0.5s ease, background 0.3s;
            min-height: 5px;
            cursor: pointer;
            position: relative;
        }

        .bar:hover {
            background: linear-gradient(180deg, #67e8f9, #06b6d4);
        }

        .bar.lowest {
            background: linear-gradient(180deg, #10b981, #059669);
        }

        .bar.highest {
            background: linear-gradient(180deg, #ef4444, #dc2626);
        }

        .bar-date-label {
            color: #94a3b8;
            font-size: 11px;
            margin-top: 10px;
            text-align: center;
        }

        /* === LINE CHART (pure CSS + SVG) === */
        .line-chart-wrapper {
            max-width: 800px;
            margin: 20px auto;
            background: #111827;
            border: 1px solid #1e293b;
            border-radius: 18px;
            padding: 30px;
        }

        .line-chart-title {
            text-align: center;
            color: #e2e8f0;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .line-chart-subtitle {
            text-align: center;
            color: #94a3b8;
            font-size: 13px;
            margin-bottom: 20px;
        }

        #noResults {
            text-align: center;
            color: #94a3b8;
            padding: 40px;
            font-size: 16px;
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">DealDive</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="compare.html">Compare</a>
            <a href="trends.html" class="active">Trends</a>

        </nav>
        <div class="auth-buttons">
            <button onclick="location.href='index.html'">Login</button>
        </div>
    </header>

    <section class="hero">
        <h1>📈 Price History & Trends</h1>
        <p>Track how prices have changed over the last 7 months.</p>

        <div class="trends-search">
            <input id="trendSearchInput" type="text" placeholder="Search a product (e.g. iPhone, laptop, Sony...)"
                onkeyup="if(event.key==='Enter') searchTrends()" />
            <button onclick="searchTrends()">Search</button>
        </div>

        <div id="productChips" class="product-list"></div>

        <div id="noResults">
            <p>🔍 Search for a product to see its price history chart.</p>
        </div>

        <!-- Stats cards -->
        <div class="price-stats" id="priceStats" style="display:none;">
            <div class="stat-card">
                <h4>Current Price</h4>
                <div class="value teal" id="statCurrent">-</div>
            </div>
            <div class="stat-card">
                <h4>Lowest</h4>
                <div class="value green" id="statLowest">-</div>
            </div>
            <div class="stat-card">
                <h4>Highest</h4>
                <div class="value red" id="statHighest">-</div>
            </div>
            <div class="stat-card">
                <h4>Total Drop</h4>
                <div class="value green" id="statDrop">-</div>
            </div>
        </div>

        <!-- Bar chart (no library needed) -->
        <div id="chartArea" style="display:none;">
            <div class="bar-chart-wrapper">
                <div class="bar-chart-title" id="chartTitle">Price History</div>
                <div class="bar-chart" id="barChart"></div>
            </div>

            <!-- SVG Line Chart -->
            <div class="line-chart-wrapper">
                <div class="line-chart-title">Price Trend Line</div>
                <div class="line-chart-subtitle" id="lineChartSub">Monthly price movement</div>
                <svg id="lineChart" viewBox="0 0 700 300" style="width:100%; height:auto;"></svg>
            </div>
        </div>
    </section>

    <script>
        // ========= DATA LOADING =========
        var ALL_PRODUCTS = [];
        var trendMatches = [];
        var dataLoadPromise = null;

        // Start loading immediately with cache-busting
        dataLoadPromise = loadData();

        async function loadData() {
            var ts = Date.now(); // Cache buster
            try {
                var a = await fetch('amazon.json?v=' + ts).then(function (r) { return r.json() });
                var f = await fetch('flipkart.json?v=' + ts).then(function (r) { return r.json() });
                var m = await fetch('meesho.json?v=' + ts).then(function (r) { return r.json() });
                ALL_PRODUCTS = a.concat(f).concat(m);
                console.log("Loaded " + ALL_PRODUCTS.length + " products, first has priceHistory: " + !!(ALL_PRODUCTS[0] && ALL_PRODUCTS[0].priceHistory));
            } catch (e) {
                console.warn("Fetch failed, using embedded data", e);
                ALL_PRODUCTS = [
                    { "title": "Apple iPhone 13 (128GB) - Midnight", "price": "₹49,900", "store": "Amazon", "category": "mobile", "priceHistory": [{ "date": "2025-08-01", "price": 55999 }, { "date": "2025-09-01", "price": 53999 }, { "date": "2025-10-01", "price": 51999 }, { "date": "2025-11-01", "price": 49999 }, { "date": "2025-12-01", "price": 47999 }, { "date": "2026-01-01", "price": 49900 }, { "date": "2026-02-01", "price": 49900 }] },
                    { "title": "Samsung Galaxy S23 FE 5G", "price": "₹29,999", "store": "Amazon", "category": "mobile", "priceHistory": [{ "date": "2025-08-01", "price": 39999 }, { "date": "2025-09-01", "price": 36999 }, { "date": "2025-10-01", "price": 34999 }, { "date": "2025-11-01", "price": 31999 }, { "date": "2025-12-01", "price": 29999 }, { "date": "2026-01-01", "price": 30999 }, { "date": "2026-02-01", "price": 29999 }] },
                    { "title": "Sony WH-1000XM5 Headphones", "price": "₹26,990", "store": "Amazon", "category": "headphones", "priceHistory": [{ "date": "2025-08-01", "price": 29990 }, { "date": "2025-09-01", "price": 28490 }, { "date": "2025-10-01", "price": 27990 }, { "date": "2025-11-01", "price": 26990 }, { "date": "2025-12-01", "price": 24990 }, { "date": "2026-01-01", "price": 26990 }, { "date": "2026-02-01", "price": 26990 }] },
                    { "title": "Apple MacBook Air M2", "price": "₹98,900", "store": "Amazon", "category": "laptop", "priceHistory": [{ "date": "2025-08-01", "price": 114900 }, { "date": "2025-09-01", "price": 109900 }, { "date": "2025-10-01", "price": 104900 }, { "date": "2025-11-01", "price": 99900 }, { "date": "2025-12-01", "price": 94900 }, { "date": "2026-01-01", "price": 98900 }, { "date": "2026-02-01", "price": 98900 }] },
                    { "title": "boAt Rockerz 255 Pro+ Bluetooth Headset", "price": "₹1,299", "store": "Flipkart", "category": "headphones", "priceHistory": [{ "date": "2025-08-01", "price": 1799 }, { "date": "2025-09-01", "price": 1599 }, { "date": "2025-10-01", "price": 1499 }, { "date": "2025-11-01", "price": 1399 }, { "date": "2025-12-01", "price": 1199 }, { "date": "2026-01-01", "price": 1299 }, { "date": "2026-02-01", "price": 1299 }] },
                    { "title": "Nike Air Max 270 React Running Shoes", "price": "₹9,995", "store": "Amazon", "category": "shoes", "priceHistory": [{ "date": "2025-08-01", "price": 12995 }, { "date": "2025-09-01", "price": 11995 }, { "date": "2025-10-01", "price": 10995 }, { "date": "2025-11-01", "price": 9995 }, { "date": "2025-12-01", "price": 8995 }, { "date": "2026-01-01", "price": 9995 }, { "date": "2026-02-01", "price": 9995 }] }
                ];
            }
        }

        function stripChars(s) {
            return s.replace(/[^a-z0-9]/g, '');
        }

        // searchTrends now WAITS for data to load before filtering
        async function searchTrends() {
            var rawQuery = document.getElementById("trendSearchInput").value;
            var query = rawQuery.toLowerCase().replace(/[^a-z0-9\s]/g, '').trim();

            if (!query) { alert("Please enter a search term."); return; }

            // Wait for data to finish loading
            if (dataLoadPromise) {
                await dataLoadPromise;
                dataLoadPromise = null;
            }

            if (ALL_PRODUCTS.length === 0) {
                alert("No product data available.");
                return;
            }

            var queryTokens = query.split(/\s+/).filter(function (t) { return t.length > 0 });

            trendMatches = ALL_PRODUCTS.filter(function (item) {
                var title = item.title.toLowerCase();
                var ts = stripChars(title);
                var matched = 0;
                queryTokens.forEach(function (token) {
                    if (title.indexOf(token) !== -1 || ts.indexOf(token) !== -1) matched++;
                });
                if (queryTokens.length === 1) return title.indexOf(queryTokens[0]) !== -1 || ts.indexOf(queryTokens[0]) !== -1;
                return (matched / queryTokens.length) >= 0.4;
            });

            var chipsContainer = document.getElementById("productChips");
            var noResults = document.getElementById("noResults");

            if (trendMatches.length === 0) {
                chipsContainer.innerHTML = "<p style='color:#94a3b8'>No products found for \"" + rawQuery + "\"</p>";
                noResults.style.display = "none";
                document.getElementById("chartArea").style.display = "none";
                document.getElementById("priceStats").style.display = "none";
                return;
            }

            noResults.style.display = "none";

            var html = "";
            for (var i = 0; i < trendMatches.length; i++) {
                var item = trendMatches[i];
                var short = item.title.length > 40 ? item.title.substring(0, 40) + "..." : item.title;
                html += '<div class="product-chip" onclick="showPriceHistory(' + i + ')" id="chip-' + i + '">';
                html += '🏷️ ' + short + ' <span style="color:#94a3b8;font-size:11px">(' + item.store + ')</span>';
                html += '</div>';
            }
            chipsContainer.innerHTML = html;

            // Auto-show first
            showPriceHistory(0);
        }

        function showPriceHistory(idx) {
            var product = trendMatches[idx];
            if (!product || !product.priceHistory) {
                alert("No price history data for this product.");
                return;
            }

            // Highlight chip
            var chips = document.querySelectorAll(".product-chip");
            for (var c = 0; c < chips.length; c++) chips[c].classList.remove("active");
            var active = document.getElementById("chip-" + idx);
            if (active) active.classList.add("active");

            var history = product.priceHistory;
            var prices = [];
            var labels = [];
            for (var h = 0; h < history.length; h++) {
                prices.push(history[h].price);
                var d = new Date(history[h].date);
                labels.push(d.toLocaleDateString('en-IN', { month: 'short', year: '2-digit' }));
            }

            var current = prices[prices.length - 1];
            var lowest = Math.min.apply(null, prices);
            var highest = Math.max.apply(null, prices);
            var drop = highest - current;
            var dropPct = ((drop / highest) * 100).toFixed(1);

            // Update stats
            document.getElementById("statCurrent").textContent = "₹" + current.toLocaleString('en-IN');
            document.getElementById("statLowest").textContent = "₹" + lowest.toLocaleString('en-IN');
            document.getElementById("statHighest").textContent = "₹" + highest.toLocaleString('en-IN');
            document.getElementById("statDrop").textContent = "↓ ₹" + drop.toLocaleString('en-IN') + " (" + dropPct + "%)";
            document.getElementById("priceStats").style.display = "flex";

            // ======= BAR CHART (pure HTML/CSS) =======
            document.getElementById("chartTitle").textContent = "📊 " + product.title + " (" + product.store + ")";
            document.getElementById("chartArea").style.display = "block";

            var barChartEl = document.getElementById("barChart");
            var barHTML = "";
            var range = highest - lowest || 1;

            for (var b = 0; b < prices.length; b++) {
                var pct = ((prices[b] - lowest) / range) * 80 + 15; // 15-95% height
                var barClass = "bar";
                if (prices[b] === lowest) barClass += " lowest";
                if (prices[b] === highest) barClass += " highest";

                barHTML += '<div class="bar-item">';
                barHTML += '  <div class="bar-price-label">₹' + prices[b].toLocaleString('en-IN') + '</div>';
                barHTML += '  <div class="' + barClass + '" style="height:' + pct + '%"></div>';
                barHTML += '  <div class="bar-date-label">' + labels[b] + '</div>';
                barHTML += '</div>';
            }
            barChartEl.innerHTML = barHTML;

            // ======= SVG LINE CHART =======
            var svgEl = document.getElementById("lineChart");
            var svgW = 700, svgH = 280, padL = 60, padR = 30, padT = 20, padB = 40;
            var chartW = svgW - padL - padR;
            var chartH = svgH - padT - padB;

            var points = [];
            for (var p = 0; p < prices.length; p++) {
                var x = padL + (p / (prices.length - 1)) * chartW;
                var y = padT + chartH - ((prices[p] - lowest) / (range || 1)) * chartH;
                points.push({ x: x, y: y, price: prices[p], label: labels[p] });
            }

            var svgHTML = '';
            // Grid lines
            for (var g = 0; g <= 4; g++) {
                var gy = padT + (g / 4) * chartH;
                var gPrice = highest - (g / 4) * range;
                svgHTML += '<line x1="' + padL + '" y1="' + gy + '" x2="' + (svgW - padR) + '" y2="' + gy + '" stroke="#1e293b" stroke-width="1"/>';
                svgHTML += '<text x="' + (padL - 8) + '" y="' + (gy + 4) + '" fill="#94a3b8" font-size="11" text-anchor="end">₹' + Math.round(gPrice).toLocaleString('en-IN') + '</text>';
            }

            // Area fill
            var areaPath = 'M' + points[0].x + ',' + points[0].y;
            for (var a = 1; a < points.length; a++) {
                areaPath += ' L' + points[a].x + ',' + points[a].y;
            }
            areaPath += ' L' + points[points.length - 1].x + ',' + (padT + chartH);
            areaPath += ' L' + points[0].x + ',' + (padT + chartH) + ' Z';
            svgHTML += '<path d="' + areaPath + '" fill="rgba(79,209,197,0.15)"/>';

            // Line
            var linePath = 'M' + points[0].x + ',' + points[0].y;
            for (var l = 1; l < points.length; l++) {
                linePath += ' L' + points[l].x + ',' + points[l].y;
            }
            svgHTML += '<path d="' + linePath + '" fill="none" stroke="#4fd1c5" stroke-width="3" stroke-linejoin="round"/>';

            // Dots and labels
            for (var j = 0; j < points.length; j++) {
                var col = "#4fd1c5";
                if (points[j].price === lowest) col = "#10b981";
                if (points[j].price === highest) col = "#ef4444";
                svgHTML += '<circle cx="' + points[j].x + '" cy="' + points[j].y + '" r="6" fill="' + col + '" stroke="#0f172a" stroke-width="2"/>';
                svgHTML += '<text x="' + points[j].x + '" y="' + (padT + chartH + 25) + '" fill="#94a3b8" font-size="11" text-anchor="middle">' + points[j].label + '</text>';
            }

            svgEl.innerHTML = svgHTML;

            document.getElementById("lineChartSub").textContent = product.store + " · " + labels[0] + " → " + labels[labels.length - 1];

            // Scroll to chart
            document.getElementById("priceStats").scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
    </script>
</body>

</html>
